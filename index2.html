<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style2.css">
    <title>Cafetería POO</title>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fs-1">
                ☕ Cafetería POO
            </span>
        </div>
    </nav>
    <div class="container my-4">
        <div class="row">
            <!-- SECCIÓN INICIO / MENÚ -->
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white h-25">
                        <h4 class="mb-0">Menú de Productos</h4>
                    </div>
                    <div class="w-100 d-flex">
                        <select id="opciones" class="form-select form-select-sm w-50 text-center"
                            aria-label="Small select example">
                            <option value="1" selected>Open this select menu</option>
                            <option value="1">Todas</option>
                            <option value="2">Bebidas calientes</option>
                            <option value="3">Bebidas Frias</option>
                            <option value="4">Postres</option>
                            <option value="5">Comida</option>
                        </select>
                        <input id="input" class="w-50" type="text" placeholder="Busqueda de alimentos y bebidas">
                    </div>
                    <div class="card-body">
                        <div id="contenedorProductos" class="row g-3">
                            <!-- Producto -->
                        </div>
                    </div>
                </div>
            </div>
            <!-- PEDIDO + TOTALES -->
            <div class="col-lg-5">
                <!-- PEDIDO -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Pedido</h4>
                    </div>
                    <div id="pedidosVisuales" class="card-body pedido-container">


                        <!-- Item Pedido -->
                    </div>
                </div>
                <!-- TOTALES -->
                <div id="resumen" class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Resumen</h4>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal:</span>
                            <strong id="SubTotal">Q .00</strong>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>IVA (5%):</span>
                            <strong id="iva">Q .00</strong>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <h5>Total:</h5>
                            <h5 class="text-dark" id="Total">Q .00</h5>
                        </div>
                        <button id="confirmar" class="btn btn-dark w-100 mt-3" disabled>
                            Confirmar Pedido
                        </button>
                    </div>
                </div>
                <!--nota final-->
                <div id="final" class="card shadow-sm mt-3 d-none">
                    <div class="card-header bg-dark text-white d-flex justify-content-between">
                        <h4 class="mb-0">Pedido Finalizado</h4>
                        <button id="borrar" class=" btn btn-danger text-white">X</button>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="fs-5">Productos:</span>
                            <div id="lista">

                            </div>
                        </div>
                        <div class="d-flex justify-content-between flex-column mb-2">
                            <span class="fs-5">Total pagado:</span>
                            <strong id="TotalPagado" class="fs-5">Q .00</strong>
                            <p>
                                <strong class="fs-5">Gracias por su compra!!!</strong>
                            </p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="./app2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
